name: Build

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]           # 打 v* 标签时额外把 Windows 安装包传到 Releases
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Linux: 构建 + 测试（用来出绿勾）
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: linux
          target: desktop

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libcurl4-openssl-dev libjsoncpp-dev libsqlite3-dev libssl-dev \
            libfmt-dev libspdlog-dev libmediainfo-dev

      - name: Configure
        run: |
          cmake -S app -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run ctest
        run: cd build && ctest --output-on-failure

  # ---------------------------------------------------------------------------
  # Windows: 构建 + 打成免安装 zip + (打标签时) 上传到 Releases
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable long paths
        run: git config --system core.longpaths true

      - name: Set up vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"

      # vcpkg 二进制缓存：Qt 等重依赖只在首次编译，之后命中缓存秒过
      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: vcpkg-${{ runner.os }}-${{ hashFiles('app/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Build llama runtime (CPU only)
        shell: pwsh
        run: |
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\app\scripts\build_llama_windows.ps1" `
            "cuda=off" `
            "vulkan=off" `
            "blas=off" `
            "vcpkgroot=$vcpkgRoot"

      # 只构建 Standard 变体（不是 3 个），大幅缩短时间
      - name: Build Windows app (Standard variant)
        shell: pwsh
        run: |
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\app\build_windows.ps1" `
            -Configuration Release `
            -VcpkgRoot $vcpkgRoot `
            -Variants Standard `
            -Parallel 4

      # 把带全部依赖 DLL 的输出目录打成免安装 zip
      - name: Package portable zip
        shell: pwsh
        run: |
          $out = "$env:GITHUB_WORKSPACE\app\build-windows\Release"
          if (-not (Test-Path "$out\aifilesorter.exe")) {
            Write-Error "构建产物缺失: $out\aifilesorter.exe"
            exit 1
          }
          $zip = "$env:GITHUB_WORKSPACE\FileButler-windows-x64.zip"
          Compress-Archive -Path "$out\*" -DestinationPath $zip -Force
          Write-Host "已生成 $zip"

      - name: Upload Windows zip (Actions artifact)
        uses: actions/upload-artifact@v4
        with:
          name: FileButler-windows-x64
          path: FileButler-windows-x64.zip
          if-no-files-found: error

      # 只有推 v* 标签时，才把 zip 传到对应的 GitHub Release
      - name: Publish zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: FileButler-windows-x64.zip
